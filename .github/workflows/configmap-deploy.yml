name: Publish configmap

permissions:
  contents: write

on:
  push:
    branches: [master]
    paths:
      - 'src/configmap/**'
      - '.github/workflows/configmap-deploy.yml'

  workflow_dispatch:
    inputs:
      dryRun:
        description: 'Run tests without publishing or committing a version bump'
        required: false
        default: false
        type: boolean

jobs:
  publish:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name Pester -Force -Confirm:$false
          Install-Module -Name require -Force -Confirm:$false
          Import-Module require -Erroraction stop
          req pathutils

      - name: Run tests
        uses: PSModule/Invoke-Pester@v3
        with:
          Path: ./src/configmap/test
          Run_Path: ./src/configmap/test

      - name: Publish configmap
        if: ${{ !inputs.dryRun }}
        shell: pwsh
        env:
          PS_PUBLISH_REPO_KEY: ${{ secrets.PS_PUBLISH_REPO_KEY }}
        run: |
          scripts/lib/push.ps1 -path ./src/configmap/configmap.psd1 -newversion -Verbose

      - name: Commit version bump
        if: ${{ !inputs.dryRun }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/configmap/configmap.psd1
          git diff --cached --quiet || git commit -m "bump configmap version"
          git push

      - name: Create GitHub release
        if: ${{ !inputs.dryRun }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = (Import-PowerShellDataFile ./src/configmap/configmap.psd1).ModuleVersion
          $tag = "configmap-v$version"
          git tag $tag
          git push origin $tag
          gh release create $tag --title "configmap $version" --generate-notes
