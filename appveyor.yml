version: 1.0.{build}
image: Visual Studio 2022

install:
- git submodule update --init --recursive
- pwsh: scripts/lib/init.ps1
- pwsh: scripts/lib/restore.ps1
- pwsh: |
    ipmo require
    gmo require
    req configmap
- pwsh: qbuild init
- pwsh: qbuild restore
build_script:
- pwsh: qbuild build
- pwsh: write-host "no need to build powershell"
test_script:
- pwsh: qbuild test
artifacts:
- path: artifacts
- path: src/publishmap
deploy_script:
- pwsh: qbuild push . -buildno $env:APPVEYOR_BUILD_NUMBER