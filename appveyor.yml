version: 1.0.{build}
install:
- git submodule update --init --recursive
- ps: scripts/lib/init.ps1
- ps: scripts/lib/restore.ps1
- ps: require configmap
- ps: qbuild init
- ps: qbuild restore
build_script:
- ps: qbuild build
- ps: write-host "no need to build powershell"
test_script:
- ps: qbuild test
artifacts:
- path: artifacts
- path: src/publishmap
deploy_script:
- ps: qbuild push . -buildno $env:APPVEYOR_BUILD_NUMBER